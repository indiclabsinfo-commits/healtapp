<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindCare — UI Preview (Light)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F5F7FA;font-family:'DM Sans',sans-serif;color:#1A1A2E;overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:4px}

@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

.orb{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none}
.glass{background:rgba(255,255,255,0.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(0,0,0,0.06);box-shadow:0 1px 8px rgba(0,0,0,0.04)}
.accent-gradient{background:linear-gradient(135deg,#0D9488,#0A7A70,#065A60);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tag{display:inline-block;padding:4px 10px;border-radius:100px;font-size:10px;font-weight:500;background:rgba(13,148,136,0.08);color:#0D9488;border:1px solid rgba(13,148,136,0.12)}

.pill-nav{display:flex;gap:6px;padding:4px;background:rgba(0,0,0,0.03);border-radius:100px;border:1px solid rgba(0,0,0,0.06);flex-wrap:wrap;justify-content:center}
.pill-btn{padding:8px 16px;border-radius:100px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.3px;transition:all 0.3s;white-space:nowrap;background:transparent;color:rgba(0,0,0,0.4)}
.pill-btn.active{background:linear-gradient(135deg,#0D9488,#0A7A70);color:#fff}
.pill-btn:not(.active):hover{color:rgba(0,0,0,0.7);background:rgba(0,0,0,0.04)}

.phone-frame{width:290px;height:600px;border-radius:36px;background:#FFFFFF;border:2px solid rgba(0,0,0,0.12);overflow:hidden;position:relative;box-shadow:0 0 0 1px rgba(0,0,0,0.03),0 20px 60px rgba(0,0,0,0.1),0 0 80px rgba(13,148,136,0.04);animation:scaleIn 0.5s ease-out;flex-shrink:0}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:24px;background:#FFFFFF;border-radius:0 0 16px 16px;z-index:50}
.phone-screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 20px 0;font-size:10px;font-weight:600;color:rgba(0,0,0,0.5);position:relative;z-index:40;height:32px}

.cta-btn{width:100%;padding:16px;border:none;border-radius:16px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;letter-spacing:0.5px;transition:all 0.3s;background:linear-gradient(135deg,#0D9488,#0A7A70);color:#FFFFFF}
.cta-btn:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(13,148,136,0.2)}
.cta-btn-outline{width:100%;padding:16px;border:1px solid rgba(13,148,136,0.3);border-radius:16px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:14px;cursor:pointer;background:transparent;color:#0D9488}
.input-field{width:100%;padding:16px 18px;border-radius:14px;border:1px solid rgba(0,0,0,0.08);background:rgba(0,0,0,0.02);color:#1A1A2E;font-family:'DM Sans',sans-serif;font-size:13px}

.main-wrap{position:relative;z-index:10}
.header{padding:40px 40px 0;text-align:center;animation:fadeUp 0.8s ease-out}
.display-area{display:flex;justify-content:center;align-items:flex-start;padding:40px 20px 60px;gap:60px;flex-wrap:wrap}
.desc-panel{max-width:340;padding-top:20px;animation:slideIn 0.5s ease-out}
.desc-panel h2{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:6px;line-height:1.2}
.check-item{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.check-icon{width:24px;height:24px;border-radius:8px;flex-shrink:0;background:rgba(13,148,136,0.08);border:1px solid rgba(13,148,136,0.12);display:flex;align-items:center;justify-content:center;font-size:10px;color:#0D9488}
.screen{display:none}.screen.active{display:block}
.footer{text-align:center;padding:0 40px 40px;color:rgba(0,0,0,0.15);font-size:11px;letter-spacing:1px}

/* Responsive */
@media(max-width:700px){
  .display-area{flex-direction:column;align-items:center;gap:30px;padding:20px}
  .header{padding:20px 20px 0}
  .desc-panel{max-width:290px}
}
</style>
</head>
